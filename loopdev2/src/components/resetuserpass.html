<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Username/Password - Loop</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Favicon -->
    <link rel="icon" href="loopdev/images/loopfavicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Top Banner with Logo -->
    <header class="container-fluid bg-light text-center py-2">
        <img src="loopdev/images/silverlogo.webp" alt="Silver Logo" class="img-fluid">
    </header>

    <!-- Main Content: Reset Password/Username Box and Logo -->
    <main class="container d-flex align-items-center justify-content-center" style="height: 80vh;">
        <div class="row w-100">
            <!-- Left Side Logo -->
            <div class="col-md-6 text-center">
                <img src="loopdev/images/loopfavicon.png" alt="Loop Favicon" class="img-fluid">
            </div>

            <!-- Right Side Reset Box -->
            <div class="col-md-6">
                <div class="card p-4" style="border: 2px solid purple;">
                    <h3 class="text-center mb-4">Reset Password or Username</h3>
                    <form>
                        <div class="form-group">
                            <label for="email">Enter your email address</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <img src="loopdev/images/person.svg" alt="Email Icon" style="width: 20px;">
                                    </span>
                                </div>
                                <input type="email" id="email" class="form-control" placeholder="Email" required />
                            </div>
                        </div>
                        <!-- Buttons for Reset -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-block mb-2">Send Password Reset Link</button>
                            <button type="submit" class="btn btn-secondary btn-block">Send Username Reset Link</button>
                        </div>
                        <div class="mt-3 text-center">
                            <!-- Hyperlink to login.html -->
                            <a href="index.html">Remembered your username or password? Login here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="container-fluid bg-light py-3">
        <div class="row">
            <!-- Left side: Address and logo -->
            <div class="col-md-6">
                <img src="loopdev/images/silverlogofooter.png" alt="Silver Footer Logo" class="img-fluid">
                <address>
                    Silver School of Social Work<br>
                    1 Washington Square North<br>
                    New York, NY 10003<br>
                    P. 212.998.5900
                </address>
            </div>

            <!-- Right side: Collaborations -->
            <div class="col-md-6 text-right">
                <p>Developed by</p>
                <p>In collaboration with</p>
                <div class="logos">
                    <img src="loopdev/images/steinhardtlogo.png" alt="Steinhardt Logo" class="img-fluid mb-2">
                    <img src="loopdev/images/silverlogo.webp" alt="Silver Logo" class="img-fluid mb-2">
                    <img src="loopdev/images/tandonlogo.png" alt="Tandon Logo" class="img-fluid mb-2">
                    <p>Createlab</p>
                    <img src="loopdev/images/createlablogo.png" alt="Createlab Logo" class="img-fluid">
                </div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
